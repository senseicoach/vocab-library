                   RESET & BASE
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* ============================================================
                   HEADER - RED THEMED WITH GOLD MAPLE LEAVES
                   ============================================================ */
        .site-header {
            background: linear-gradient(135deg, #8B0000, #CC0000, #B71C1C);
            padding: 24px 20px 16px;
            position: relative;
            border-bottom: 5px solid #FFD700;
            text-align: center;
            overflow: hidden;
        }

        .site-header h1 {
            color: #fff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }

        /* Gold maple leaf icons flanking the title */
        .site-header h1 .leaf-icon {
            font-size: 2rem;
            opacity: 0.9;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
            color: #FFD700;
            display: inline-block;
        }

        .site-header .subhead {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.1rem;
            margin-top: 4px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .site-header .stats {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        /* ---- Search Bar ---- */
        .search-wrapper {
            max-width: 560px;
            margin: 16px auto 0;
            padding: 0 12px;
            position: relative;
            z-index: 1;
        }

        .search-wrapper input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            backdrop-filter: blur(4px);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-wrapper input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.25);
        }

        /* ============================================================
                   MAIN GRID
                   ============================================================ */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .topic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        /* ---- Topic Card ---- */
        .topic-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            border-left: 4px solid transparent;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
            border-left-color: #CC0000;
        }

        .topic-card .emoji {
            font-size: 1.6rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .topic-card .info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topic-card .name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topic-card .count {
            font-size: 0.7rem;
            font-weight: 500;
            color: #999;
            letter-spacing: 0.3px;
        }

        /* ============================================================
                   FLASHCARD OVERLAY
                   ============================================================ */
        .flashcard-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .flashcard-overlay.active {
            display: flex;
        }

        .flashcard {
            background: #fff;
            border-radius: 28px;
            max-width: 640px;
            width: 100%;
            padding: 36px 32px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: fadeUp 0.3s ease;
            border-top: 6px solid #CC0000;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- Close button ---- */
        .flashcard-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .flashcard-close:hover {
            color: #CC0000;
        }

        /* ---- Progress ---- */
        .progress-wrap {
            margin-bottom: 24px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: #e8e8e8;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #CC0000, #FF6F00, #FFD700);
            border-radius: 20px;
            transition: width 0.4s ease;
        }

        /* ---- Card content ---- */
        .card-word {
            font-size: 2.4rem;
            font-weight: 800;
            color: #8B0000;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        .card-pos {
            display: inline-block;
            background: #FFE5E5;
            color: #CC0000;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 2px 14px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }

        .card-pronunciation {
            color: #999;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 18px;
        }

        .card-definition {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #222;
            margin-bottom: 18px;
            padding: 16px 18px;
            background: #FFF8F0;
            border-radius: 12px;
            border-left: 4px solid #FFD700;
        }

        .card-example {
            font-style: italic;
            color: #555;
            background: #fafafa;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 28px;
            border-left: 3px solid #ddd;
        }

        .card-example::before {
            content: "“";
            font-size: 1.4rem;
            color: #CC0000;
            font-style: normal;
            margin-right: 4px;
        }

        .card-example::after {
            content: "”";
            font-size: 1.4rem;
            color: #CC0000;
            font-style: normal;
            margin-left: 4px;
        }

        /* ---- Buttons ---- */
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .btn-skip {
            color: #666;
            border: 2px solid #ddd;
            padding: 10px 24px;
        }

        .btn-skip:hover {
            border-color: #CC0000;
            color: #CC0000;
            background: rgba(204, 0, 0, 0.04);
        }

        .btn-reveal {
            background: #CC0000;
            color: #fff;
            box-shadow: 0 6px 16px rgba(204, 0, 0, 0.35);
            padding: 12px 36px;
        }

        .btn-reveal:hover {
            background: #8B0000;
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(204, 0, 0, 0.45);
        }

        .btn-reveal:active {
            transform: scale(0.97);
        }

        /* ---- "Deck Complete" state ---- */
        .deck-complete {
            text-align: center;
            padding: 16px 0 8px;
        }

        .deck-complete .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 8px;
        }

        .deck-complete h2 {
            font-size: 1.6rem;
            color: #8B0000;
            margin-bottom: 4px;
        }

        .deck-complete p {
            color: #888;
            margin-bottom: 24px;
        }

        .deck-complete .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .btn-outline {
            border: 2px solid #8B0000;
            color: #8B0000;
            background: transparent;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: #8B0000;
            color: #fff;
        }

        .btn-red {
            background: #CC0000;
            color: #fff;
            padding: 10px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(204, 0, 0, 0.3);
        }

        .btn-red:hover {
            background: #8B0000;
            transform: scale(1.02);
        }

        /* ============================================================
                   RESPONSIVE
                   ============================================================ */
        @media (max-width: 600px) {
            .site-header h1 {
                font-size: 1.3rem;
                gap: 8px;
            }
            .site-header h1 .leaf-icon {
                font-size: 1.4rem;
            }
            .topic-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            .topic-card {
                padding: 12px 10px;
            }
            .topic-card .emoji {
                font-size: 1.3rem;
            }
            .topic-card .name {
                font-size: 0.85rem;
            }
            .flashcard {
                padding: 28px 18px 22px;
            }
            .card-word {
                font-size: 1.8rem;
            }
            .card-actions {
                flex-direction: column-reverse;
            }
            .btn-reveal,
            .btn-skip {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
            .btn-reveal {
                padding: 14px;
            }
            .deck-complete .btn-group {
                flex-direction: column;
                align-items: center;
            }
        }

        /* No results message */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #888;
            font-size: 1.1rem;
        }
        .no-results span {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
